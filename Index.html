<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Surprise ✨</title>
    <style>
        body {
            margin: 0; background: #0a0a1a; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .card {
            width: 85%; max-width: 350px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 182, 193, 0.3);
            padding: 30px; border-radius: 25px; text-align: center;
            backdrop-filter: blur(10px); display: none;
        }
        #s1 { display: block; border: none; background: none; }
        h1 { color: #ffb6c1; margin-bottom: 20px; }
        p { font-size: 1.1rem; line-height: 1.6; }
        .btn {
            background: linear-gradient(45deg, #ffb6c1, #ff69b4);
            color: #fff; border: none; padding: 15px 25px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            width: 100%; margin-top: 20px; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="s1">
        <button class="btn" onclick="move(2)">A LITTLE SURPRISE ✨</button>
    </div>

    <div id="s2" class="card">
        <h1>Hello Annu! 😊</h1>
        <p>Pata nahi ye dosti kahan tak jayegi, par itna zaroor pata hai ki tumse baat karke accha lagta hai.</p>
        <button class="btn" onclick="move(3)">Aage Padho ➡</button>
    </div>

    <div id="s3" class="card">
        <h1>Annu... ✨</h1>
        <p>Dost banoge?</p>
        <button class="btn" onclick="done()">Yes! ✨</button>
        <button class="btn" style="background: #444;" onclick="move(5)">no sorry</button>
    </div>

    <div id="s4" class="card">
        <h1>Thank You Annu! 🌸</h1>
        <p>Arun is very happy to have you as a friend! 😊</p>
    </div>

    <div id="s5" class="card">
        <h1>😔</h1>
        <p>Sorry Annu, for wasting your time.</p>
        <button class="btn" onclick="move(1)">Piche Jayein</button>
    </div>

    <script>
        function move(n) {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'none';
            document.getElementById('s3').style.display = 'none';
            document.getElementById('s4').style.display = 'none';
            document.getElementById('s5').style.display = 'none';
            document.getElementById('s' + n).style.display = 'block';
        }

        function done() {
            move(4);
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.innerHTML = '🌸';
                    f.style.position = 'absolute';
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.bottom = '-50px';
                    f.style.fontSize = '25px';
                    f.style.transition = '3s linear';
                    document.body.appendChild(f);
                    setTimeout(() => { f.style.bottom = '110vh'; f.style.opacity = '0'; }, 100);
                    setTimeout(() => f.remove(), 3000);
                }, i * 100);
            }
        }
    </script>
</body>
  </html>
