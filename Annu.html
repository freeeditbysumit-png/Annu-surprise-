<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Annu</title>
    <style>
        body {
            margin: 0; background: #0a0a1a; color: #fff;
            font-family: Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .card {
            width: 85%; max-width: 350px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 182, 193, 0.3);
            padding: 25px; border-radius: 20px; text-align: center;
            display: none;
        }
        #s1 { display: block; border: none; background: none; }
        h1 { color: #ffb6c1; }
        .btn {
            background: linear-gradient(45deg, #ffb6c1, #ff69b4);
            color: #fff; border: none; padding: 15px 20px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            width: 100%; margin-top: 20px;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 30; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(star);
        }
    </script>

    <div id="s1">
        <button class="btn" onclick="go(2)">A LITTLE SURPRISE ✨</button>
    </div>

    <div id="s2" class="card">
        <h1>Hello Annu! 😊</h1>
        <p>Pata nahi ye dosti kahan tak jayegi, par itna zaroor pata hai ki tumse baat karke accha lagta hai.</p>
        <button class="btn" onclick="go(3)">Keep Reading ➡</button>
    </div>

    <div id="s3" class="card">
        <h1>New Beginnings ✨</h1>
        <p>Annu, dost banoge?</p>
        <button class="btn" onclick="celebrate()">Yes! ✨</button>
        <button class="btn" style="background: #444;" onclick="go(5)">no sorry</button>
    </div>

    <div id="s4" class="card">
        <h1>Thank You Annu! 🌸</h1>
        <p>Arun is happy to have you as a friend!</p>
    </div>

    <div id="s5" class="card">
        <h1>😔</h1>
        <p>Sorry Annu, for wasting your time.</p>
    </div>

    <script>
        function go(n) {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'none';
            document.getElementById('s3').style.display = 'none';
            document.getElementById('s4').style.display = 'none';
            document.getElementById('s5').style.display = 'none';
            document.getElementById('s' + n).style.display = 'block';
        }

        function celebrate() {
            go(4);
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.innerHTML = '🌸';
                    f.style.position = 'absolute';
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.bottom = '-50px';
                    f.style.fontSize = '25px';
                    f.style.transition = '3s linear';
                    document.body.appendChild(f);
                    setTimeout(() => { f.style.bottom = '110vh'; f.style.opacity = '0'; }, 100);
                    setTimeout(() => f.remove(), 3000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
